<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Profilul Meu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-arrow-left"></i> Înapoi la Dashboard
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Mesaj de succes -->
            <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill"></i> Profilul a fost actualizat cu succes!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow">
                <div class="card-header bg-white text-center py-4">
                    <h3 th:text="${user.nume + ' ' + user.prenume}">Nume Prenume</h3>
                    <span class="badge bg-primary"
                          th:text="${isStudent ? 'STUDENT' : 'PROFESOR'}">
                            Rol
                        </span>
                </div>

                <div class="card-body p-4">
                    <form th:action="${isStudent ? '/profil/update/student' : '/profil/update/profesor'}"
                          method="post">

                        <!-- Email (readonly pentru toți) -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-envelope"></i> Email
                            </label>
                            <input type="email"
                                   th:value="${user.email}"
                                   class="form-control"
                                   readonly>
                        </div>

                        <!-- Nume și Prenume - EDITABILE -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-person"></i> Nume
                                </label>
                                <input type="text"
                                       name="nume"
                                       th:value="${user.nume}"
                                       class="form-control"
                                       required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-person-badge"></i> Prenume
                                </label>
                                <input type="text"
                                       name="prenume"
                                       th:value="${user.prenume}"
                                       class="form-control"
                                       required>
                            </div>
                        </div>

                        <!-- Câmpuri specifice STUDENT -->
                        <div th:if="${isStudent}" class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-mortarboard"></i> An Studiu
                            </label>
                            <select name="anStudiu" class="form-select" required>
                                <option th:selected="${user.anStudiu == 1}" value="1">Anul 1</option>
                                <option th:selected="${user.anStudiu == 2}" value="2">Anul 2</option>
                                <option th:selected="${user.anStudiu == 3}" value="3">Anul 3</option>
                                <option th:selected="${user.anStudiu == 4}" value="4">Anul 4</option>
                            </select>
                        </div>

                        <!-- Câmpuri specifice PROFESOR -->
                        <div th:if="${!isStudent}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-building"></i> Departament
                                </label>
                                <input type="text"
                                       name="departament"
                                       th:value="${user.departament}"
                                       class="form-control"
                                       placeholder="Ex: Informatică">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-telephone"></i> Telefon
                                </label>
                                <input type="text"
                                       name="telefon"
                                       th:value="${user.telefon}"
                                       class="form-control"
                                       placeholder="Ex: 0712345678">
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="text-center">
                            <button type="submit" class="btn btn-success btn-lg px-5">
                                <i class="bi bi-save"></i> Salvează Modificările
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
