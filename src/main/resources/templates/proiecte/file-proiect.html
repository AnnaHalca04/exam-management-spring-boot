<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestionare Proiect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="col-md-6 offset-md-3 card shadow p-4">
        <h2 th:text="${proiect.idProiect == null} ? 'Adaugă Proiect' : 'Editează Proiect'"></h2>
        <hr>
        <form th:action="@{/proiecte/salveaza}" th:object="${proiect}" method="post">
            <input type="hidden" th:field="*{idProiect}" />

            <div class="mb-3">
                <label class="form-label">Titlu Proiect</label>
                <input type="text" th:field="*{titlu}" class="form-control" placeholder="Introduceți titlul...">
                <div class="text-danger" th:if="${#fields.hasErrors('titlu')}" th:errors="*{titlu}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Deadline</label>
                <input type="date" th:field="*{deadline}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Materie</label>
                <select th:field="*{materie}" class="form-select">
                    <option th:each="m : ${materii}" th:value="${m.idMaterie}" th:text="${m.nume}"></option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/dashboard" class="btn btn-secondary">Înapoi</a>
                <button type="submit" class="btn btn-success">Salvează Datele</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
