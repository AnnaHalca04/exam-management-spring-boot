<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestiune Examen | Portal Academic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: bold;
            color: #344767;
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4">
                <h2 class="text-center mb-4"
                    th:text="${examen.idExamen == null} ? 'Programare Examen Nou' : 'Editare Examen'">
                    Gestiune Examen
                </h2>
                <hr>

                <form th:action="@{/examene/salveaza}" th:object="${examen}" method="post">
                    <input type="hidden" th:field="*{idExamen}" />

                    <div class="mb-3">
                        <label class="form-label">Materia</label>
                        <select th:field="*{materie.idMaterie}" class="form-select" required>
                            <option value="" disabled selected>Alege materia...</option>
                            <option th:each="m : ${materii}"
                                    th:value="${m.idMaterie}"
                                    th:text="${m.nume}">
                            </option>
                        </select>
                        <div th:if="${#fields.hasErrors('materie')}"
                             th:errors="*{materie}"
                             class="error-msg"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sala</label>
                        <select th:field="*{sala.idSala}" class="form-select" required>
                            <option value="" disabled selected>Alege sala...</option>
                            <option th:each="s : ${sali}"
                                    th:value="${s.idSala}"
                                    th:text="${s.codSala + ' - ' + s.cladire}">
                            </option>
                        </select>
                        <div th:if="${#fields.hasErrors('sala')}"
                             th:errors="*{sala}"
                             class="error-msg"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" th:field="*{data}" class="form-control" required>
                            <div th:if="${#fields.hasErrors('data')}"
                                 th:errors="*{data}"
                                 class="error-msg"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ora începerii</label>
                            <input type="time" th:field="*{ora}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Durata (minute)</label>
                            <input type="number" th:field="*{durata}"
                                   class="form-control"
                                   placeholder="ex: 120"
                                   min="30"
                                   required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tip Examen</label>
                            <select th:field="*{tip}" class="form-select" required>
                                <option value="">Selectează tipul...</option>
                                <option value="Final">Final</option>
                                <option value="Partial">Partial</option>
                                <option value="Restanta">Restanta</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sesiune</label>
                        <input type="text" th:field="*{sesiune}"
                               class="form-control"
                               placeholder="ex: Iarnă 2026"
                               required>
                        <div th:if="${#fields.hasErrors('sesiune')}"
                             th:errors="*{sesiune}"
                             class="error-msg"></div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">
                            Salvează Examenul
                        </button>
                        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                            Anulează
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
